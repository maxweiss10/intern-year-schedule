name: Sync QGenda feed

on:
  schedule:
    - cron: "3,18,33,48 * * * *"   # every 15 min (offset from top of hour)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: qgenda-sync
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch feed and convert to JSON
        env:
          ICS_URL: ${{ secrets.QGENDA_ICS_URL }}
        run: python3 .github/scripts/ics_to_json.py

      - name: Commit if changed
        run: |
          git config user.name "qgenda-sync[bot]"
          git config user.email "actions@users.noreply.github.com"
          git add schedule-live.json
          git diff --cached --quiet && echo "no changes" || {
            git commit -m "Update live schedule data"
            git push
          }
